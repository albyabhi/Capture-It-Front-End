<!--
============================================
FILE: index.html
PURPOSE: HTML shell that loads the React application
HOW IT WORKS:
  - Contains the <div id="root"> where React renders the entire app
  - Loads main.jsx as a module script (Vite handles bundling)
  - SEO meta tags describe the app for search engines
  - Google Fonts (Pacifico, Parkinsans, Urbanist) are loaded for typography
  - Google Search Console verification tag is included
CONNECTS TO: main.jsx (entry point), Vite (build tool)
USER IMPACT: This is the single HTML page that loads when you visit the app.
  Everything else (all pages, components, logic) is rendered dynamically by React.
============================================
